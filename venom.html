<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="./assets/favicon.jpeg" type="image/x-icon">
    <title>SPIDER-MAN VS VENOM</title>
    <style>
        :root {
            --vermelho-aranha: #ff0000;
            --roxo-venom: #60399f;
            --glow-aranha: 0 0 15px #ff0000;
            --glow-venom: 0 0 15px #60399f;
        }

        body {
            margin: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: none; /* Previne zoom e scroll acidental */
        }

        /* AJUSTE DO BOTÃO BACK - Alinhado e com espaço */
        .nav-button-back {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #000;
            border: 1px solid var(--vermelho-aranha);
            color: var(--vermelho-aranha);
            padding: 8px 15px; /* Mais espaço interno para o texto */
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.2s;
        }

        .nav-button-back:hover {
            background: #111;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        /* AJUSTE DO TÍTULO - Mais recuo lateral e fonte menor */
        .main-title {
            font-family: 'Arial Black', Gadget, sans-serif;
            text-align: center;
            font-size: clamp(20px, 4.5vw, 36px); /* Fonte ligeiramente menor */
            font-weight: 900;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #fff;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2)) drop-shadow(3px 0 2px rgba(255, 0, 0, 0.8)) drop-shadow(-3px 0 2px var(--roxo-venom));
            padding: 0 80px; /* Mais espaço lateral para evitar o botão */
        }

        #placar {
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .game-container {
            position: relative;
            border: 2px solid #333;
            background-color: #000;
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #gui {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
            pointer-events: none;
        }

        .player-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-icon {
            width: clamp(30px, 8vw, 45px);
            height: clamp(30px, 8vw, 45px);
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .aranha-border { border-color: var(--vermelho-aranha); box-shadow: var(--glow-aranha); }
        .venom-border { border-color: var(--roxo-venom); box-shadow: var(--glow-venom); }

        .health-container {
            width: clamp(70px, 18vw, 120px);
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
        }

        .health-bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        #venom-health { background-color: var(--roxo-venom); box-shadow: 0 0 10px var(--roxo-venom); }
        #aranha-health { background-color: var(--vermelho-aranha); box-shadow: 0 0 10px var(--vermelho-aranha); }

        .vs-badge {
            font-weight: 900;
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #vitoria-msg-container {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #vitoria-msg-text {
            font-size: clamp(24px, 7vw, 50px);
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            text-align: center;
        }

        .controles-touch {
            display: none; /* Aparece via Media Query */
            justify-content: space-between;
            width: 95%;
            max-width: 600px;
            padding: 20px;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .direcionais, .acoes { display: flex; gap: 15px; }

        .controles-touch button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: #222;
            color: white;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 0 #000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .controles-touch button:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #000; 
        }

        .pc-hints {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .controles-touch { display: flex; }
            .pc-hints { display: none; }
            .nav-button-back { top: 10px; left: 10px; padding: 6px 10px; font-size: 12px; }
            .main-title { padding: 0 70px; } /* Recuo lateral ligeiramente menor em mobile */
        }

        .hidden { display: none !important; }
    </style>
</head>

<body>
    <a href="index.html" class="nav-button-back"> < BACK </a>

    <h1 class="main-title">SPIDER-MAN VS VENOM</h1>

    <div id="placar">
        SPIDER-MAN: <span id="score-aranha">0</span> | VENOM: <span id="score-venom">0</span>
    </div>

    <div class="game-container">
        <div id="vitoria-msg-container" class="hidden">
            <h2 id="vitoria-msg-text"></h2>
        </div>

        <div id="gui">
            <div class="player-wrapper">
                <img src="assets/icon-aranha.jpeg" class="player-icon aranha-border" alt="Spider-Man">
                <div class="health-container">
                    <div id="aranha-health" class="health-bar"></div>
                </div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="player-wrapper">
                <div class="health-container">
                    <div id="venom-health" class="health-bar"></div>
                </div>
                <img src="assets/icon-venom.jpeg" class="player-icon venom-border" alt="Venom">
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="pc-hints">
            <span>[A][D] Mover | [W] Pular | [F] Teia</span>
        </div>
    </div>

    <div class="controles-touch">
        <div class="direcionais">
            <button id="btn-esquerda">◀</button>
            <button id="btn-direita">▶</button>
        </div>
        <div class="acoes">
            <button id="btn-pular">PULAR</button>
            <button id="btn-teia">TEIA</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        // Resolução lógica fixa para manter a proporção da jogabilidade
        canvas.width = 800;
        canvas.height = 400;

        // --- IMAGENS ---
        const fundoImg = new Image(); fundoImg.src = 'assets/img-fundo2.png';
        const aranhaImg = new Image(); aranhaImg.src = 'assets/icon-aranha.jpeg';
        const venomImg = new Image(); venomImg.src = 'assets/icon-venom.jpeg';

        // --- ÁUDIO ---
        const musicaFundo = new Audio('assets/venom-theme.mp3');
        musicaFundo.loop = true;
        musicaFundo.volume = 0.5;
        let musicaIniciada = false;

        function iniciarSom() {
            if (!musicaIniciada) {
                musicaFundo.play().then(() => musicaIniciada = true).catch(() => {});
            }
        }

        window.addEventListener('mousedown', iniciarSom);
        window.addEventListener('touchstart', iniciarSom);

        // --- LOGICA DO JOGO ---
        let scoreAranha = 0, scoreVenom = 0, jogoAtivo = true;
        const keys = { a: false, d: false };

        const aranha = { x: 100, y: 200, w: 50, h: 70, vida: 100, vY: 0, pulando: false, dir: 1 };
        const venom = { x: 600, y: 200, w: 60, h: 80, vida: 100, vY: 0 };

        let teias = [], ataquesVenom = [];

        function resetJogo() {
            aranha.vida = 100; venom.vida = 100;
            aranha.x = 100; venom.x = 600;
            teias = []; ataquesVenom = [];
            document.getElementById('aranha-health').style.width = "100%";
            document.getElementById('venom-health').style.width = "100%";
            document.getElementById('vitoria-msg-container').classList.add('hidden');
            jogoAtivo = true;
            requestAnimationFrame(loop);
        }

        function loop() {
            if (!jogoAtivo) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (fundoImg.complete) ctx.drawImage(fundoImg, 0, 0, canvas.width, canvas.height);

            [aranha, venom].forEach(p => {
                p.y += p.vY;
                if (p.y + p.h < canvas.height - 20) { p.vY += 0.8; } 
                else { p.vY = 0; p.y = canvas.height - 20 - p.h; p.pulando = false; }
            });

            if (keys.a) { aranha.x -= 6; aranha.dir = -1; }
            if (keys.d) { aranha.x += 6; aranha.dir = 1; }
            aranha.x = Math.max(0, Math.min(canvas.width - aranha.w, aranha.x));

            const dist = venom.x - aranha.x;
            if (dist > 180) venom.x -= 3;
            else if (dist < 120) venom.x += 3;

            if (Math.random() < 0.02) {
                ataquesVenom.push({ x: venom.x, y: venom.y + 30, vX: venom.x > aranha.x ? -7 : 7, vY: -1 });
            }

            ctx.shadowBlur = 15;
            ctx.shadowColor = "red";
            if (aranhaImg.complete) ctx.drawImage(aranhaImg, aranha.x, aranha.y, aranha.w, aranha.h);
            ctx.shadowColor = "#60399f";
            if (venomImg.complete) ctx.drawImage(venomImg, venom.x, venom.y, venom.w, venom.h);
            ctx.shadowBlur = 0;

            teias.forEach((t, i) => {
                t.x += t.vX;
                ctx.fillStyle = "cyan";
                ctx.fillRect(t.x, t.y, 15, 4);
                if (t.x > venom.x && t.x < venom.x + venom.w && t.y > venom.y && t.y < venom.y + venom.h) {
                    venom.vida -= 5;
                    document.getElementById('venom-health').style.width = venom.vida + "%";
                    teias.splice(i, 1);
                }
            });

            ataquesVenom.forEach((b, i) => {
                b.x += b.vX; b.y += b.vY;
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(b.x, b.y, 10, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "#60399f"; ctx.stroke();
                if (b.x > aranha.x && b.x < aranha.x + aranha.w && b.y > aranha.y && b.y < aranha.y + aranha.h) {
                    aranha.vida -= 10;
                    document.getElementById('aranha-health').style.width = aranha.vida + "%";
                    ataquesVenom.splice(i, 1);
                }
            });

            if (aranha.vida <= 0 || venom.vida <= 0) {
                jogoAtivo = false;
                const vText = document.getElementById('vitoria-msg-text');
                if (aranha.vida > 0) { scoreAranha++; vText.innerText = "SPIDER-MAN WINS"; vText.style.color = "var(--vermelho-aranha)"; } 
                else { scoreVenom++; vText.innerText = "VENOM WINS"; vText.style.color = "var(--roxo-venom)"; }
                document.getElementById('score-aranha').innerText = scoreAranha;
                document.getElementById('score-venom').innerText = scoreVenom;
                document.getElementById('vitoria-msg-container').classList.remove('hidden');
                setTimeout(resetJogo, 3000);
                return;
            }
            requestAnimationFrame(loop);
        }

        function pular() { if (!aranha.pulando) { aranha.vY = -16; aranha.pulando = true; } }
        function atirar() { teias.push({ x: aranha.x + (aranha.dir === 1 ? 50 : -10), y: aranha.y + 30, vX: aranha.dir * 12 }); }

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'a') keys.a = true;
            if (k === 'd') keys.d = true;
            if (k === 'w') pular();
            if (k === 'f') atirar();
        });
        window.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'a') keys.a = false;
            if (k === 'd') keys.d = false;
        });

        const bindBtn = (id, start, end) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); iniciarSom(); });
            if (end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
        };
        bindBtn('btn-esquerda', () => keys.a = true, () => keys.a = false);
        bindBtn('btn-direita', () => keys.d = true, () => keys.d = false);
        bindBtn('btn-pular', pular);
        bindBtn('btn-teia', atirar);

        loop();
    </script>
</body>
</html>
