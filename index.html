<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/favicon.jpeg" type="image/x-icon">
    <title>Spider-Man: Multiverse Battles</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="loading-screen" class="screen">
        <div class="loader-container">
            <h1 class="loading-text">NOW LOADING... <span id="status">0%</span></h1>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <h2 id="complete-msg" class="hidden">COMPLETE</h2>
        </div>
    </section>

    <section id="start-screen" class="screen hidden">
        <h1 class="game-title">SPIDER-MAN</h1>
        <h2 class="game-subtitle">MULTIVERSE BATTLES</h2>
        <div class="start-prompt">
            <p class="blink">PRESS TO START</p>
        </div>
        <div class="neon-line"></div>
    </section>

    <section id="menu-screen" class="screen hidden">
        <button id="btn-back" class="nav-button">
            < BACK </button>

                <h1 class="menu-title">SELECT THE GAME</h1>

                <div class="mobile-arrow arrow-left" id="prev-btn"></div>
                <div class="mobile-arrow arrow-right" id="next-btn"></div>

                <div class="games-container" id="carousel">
                    <div class="game-card active" data-game="classic">
                        <div class="card-preview"></div>
                        <h3>Spider-Man vs Goblin</h3>
                        <p>O Clássico</p>
                    </div>
                    <div class="game-card" data-game="venom">
                        <div class="card-preview"></div>
                        <h3>Spider-Man vs Venom</h3>
                        <p>Versão Bônus</p>
                    </div>
                    <div class="game-card" data-game="air">
                        <div class="card-preview"></div>
                        <h3>Air Battle</h3>
                        <p>Side Scroller</p>
                    </div>
                    <div class="game-card" data-game="boss">
                        <div class="card-preview"></div>
                        <h3>Boss Fight</h3>
                        <p>Estilo Cuphead</p>
                    </div>
                </div>

                <button id="btn-select" class="select-button">SELECT</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
