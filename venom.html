<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="./assets/favicon.jpeg" type="image/x-icon">
    <title>SPIDER-MAN VS VENOM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');

        :root {
            --vermelho-aranha: #ff0000;
            --roxo-venom: #60399f;
            --preto-escuro: #050505;
        }

        body {
            margin: 0;
            background-color: var(--preto-escuro);
            color: white;
            font-family: 'Bangers', cursive, system-ui;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #start-overlay h2 {
            font-size: clamp(40px, 10vw, 70px);
            color: var(--vermelho-aranha);
            text-shadow: 0 0 20px var(--vermelho-aranha);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .nav-button-game {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #000;
            border: 2px solid var(--vermelho-aranha);
            color: var(--vermelho-aranha);
            padding: 8px 20px;
            cursor: pointer;
            z-index: 1000;
            font-size: 16px;
            text-transform: uppercase;
            text-decoration: none;
            transform: skew(-15deg);
        }

        .main-title {
            text-align: center;
            font-size: clamp(24px, 6vw, 45px);
            margin: 10px 0;
            text-shadow: 3px 3px 0 var(--vermelho-aranha), -3px -3px 0 var(--roxo-venom);
        }

        #placar {
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-container {
            position: relative;
            border: 4px solid #222;
            background-color: #000;
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #gui {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .player-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-icon {
            width: clamp(35px, 8vw, 55px);
            height: clamp(35px, 8vw, 55px);
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .aranha-border {
            border-color: var(--vermelho-aranha);
            box-shadow: 0 0 15px var(--vermelho-aranha);
        }

        .venom-border {
            border-color: var(--roxo-venom);
            box-shadow: 0 0 15px var(--roxo-venom);
        }

        .health-container {
            width: clamp(80px, 20vw, 180px);
            height: 18px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            transform: skew(-15deg);
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #aranha-health {
            background: linear-gradient(90deg, #ff0000, #b30000);
        }

        #venom-health {
            background: linear-gradient(90deg, #4b2c7d, #60399f);
            float: right;
        }

        .controles-touch {
            display: none;
            position: relative;
            width: 95%;
            max-width: 700px;
            height: 180px;
            margin-top: 10px;
            z-index: 1500;
        }

        .controles-touch button {
            position: absolute;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: rgba(40, 40, 40, 0.9);
            color: white;
            font-family: 'Bangers';
            font-size: 18px;
            user-select: none;
            box-shadow: 0 5px 0 #000;
        }

        .controles-touch button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #btn-esquerda {
            left: 10px;
            bottom: 10px;
        }

        #btn-direita {
            left: 100px;
            bottom: 10px;
        }

        #btn-pular {
            left: 55px;
            bottom: 95px;
            background: var(--roxo-venom) !important;
            border-color: #fff !important;
        }

        #btn-teia {
            right: 10px;
            bottom: 40px;
            width: 75px;
            height: 75px;
            background: var(--roxo-venom) !important;
            border-color: #fff !important;
        }

        #controls-info {
            margin-top: 5px;
            font-size: 14px;
            color: #555;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .controles-touch {
                display: block;
            }

            #controls-info {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="start-overlay" onclick="startGame()">
        <h2>CLICK TO FIGHT!</h2>
        <p style="color: #fff; margin-top: 10px;">PREPARE-SE PARA O SIMBIONTE</p>
    </div>

    <a href="index.html" class="nav-button-game">
        < BACK</a>

            <h1 class="main-title">SPIDER-MAN VS VENOM</h1>

            <div id="placar">
                SPIDER: <span id="score-aranha">0</span> | VENOM: <span id="score-venom">0</span>
            </div>

            <div class="game-container">
                <div id="vitoria-msg-container"
                    style="position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;">
                    <h2 id="vitoria-msg-text" style="font-size: clamp(40px, 10vw, 80px);"></h2>
                    <p style="font-size: 20px; margin-top: 10px; color: #aaa;">REINICIANDO EM 3s...</p>
                </div>

                <div id="gui">
                    <div class="player-wrapper">
                        <img src="assets/icon-aranha.jpeg" class="player-icon aranha-border">
                        <div class="health-container">
                            <div id="aranha-health" class="health-bar"></div>
                        </div>
                    </div>
                    <div class="vs-badge"
                        style="font-size: 24px; margin: 0 15px; font-style: italic; color: #ff0000; text-shadow: 1px 1px #fff;">
                        VS</div>
                    <div class="player-wrapper">
                        <div class="health-container">
                            <div id="venom-health" class="health-bar"></div>
                        </div>
                        <img src="assets/icon-venom.jpeg" class="player-icon venom-border">
                    </div>
                </div>

                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controles-touch">
                <button id="btn-pular">PULO</button>
                <button id="btn-esquerda">◀</button>
                <button id="btn-direita">▶</button>
                <button id="btn-teia">TEIA</button>
            </div>

            <div id="controls-info">
                [A-D] MOVER | [W] PULAR | [F] TEIA
            </div>

            <script>
                const canvas = document.getElementById("gameCanvas");
                const ctx = canvas.getContext("2d");
                canvas.width = 800;
                canvas.height = 450;

                const assets = {
                    fundo: new Image(),
                    aranha: new Image(),
                    venom: new Image()
                };

                assets.fundo.src = 'assets/img-fundo2.png';
                assets.aranha.src = 'assets/spidey-game2.png';
                assets.venom.src = 'assets/venom-game.png';

                const musica = new Audio('assets/venom-theme.mp3');
                musica.loop = true;

                let jogoAtivo = false;
                let scoreAranha = 0, scoreVenom = 0;
                const keys = { a: false, d: false };

                const aranha = {
                    x: 100, y: 300, w: 80, h: 110,
                    vida: 100, vY: 0, pulando: false, dir: 1
                };
                const venom = {
                    x: 600, y: 280, w: 110, h: 130,
                    vida: 100, vY: 0, dir: -1
                };

                let teias = [], ataquesVenom = [];

                function startGame() {
                    document.getElementById('start-overlay').style.display = 'none';
                    musica.play().catch(() => { });
                    if (!jogoAtivo) {
                        jogoAtivo = true;
                        requestAnimationFrame(loop);
                    }
                }

                function resetJogo() {
                    aranha.vida = 100; venom.vida = 100;
                    aranha.x = 100; venom.x = 600;
                    teias = []; ataquesVenom = [];
                    document.getElementById('aranha-health').style.width = "100%";
                    document.getElementById('venom-health').style.width = "100%";
                    document.getElementById('vitoria-msg-container').style.display = 'none';
                    jogoAtivo = true;
                    requestAnimationFrame(loop);
                }

                function loop() {
                    if (!jogoAtivo) return;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (assets.fundo.complete) ctx.drawImage(assets.fundo, 0, 0, canvas.width, canvas.height);

                    [aranha, venom].forEach(p => {
                        p.y += p.vY;
                        if (p.y + p.h < canvas.height - 40) {
                            p.vY += 0.8;
                        } else {
                            p.vY = 0;
                            p.y = canvas.height - 40 - p.h;
                            p.pulando = false;
                        }
                    });

                    if (keys.a) { aranha.x -= 8; aranha.dir = -1; }
                    if (keys.d) { aranha.x += 8; aranha.dir = 1; }
                    aranha.x = Math.max(0, Math.min(canvas.width - aranha.w, aranha.x));

                    const centroAranha = aranha.x + aranha.w / 2;
                    const centroVenom = venom.x + venom.w / 2;

                    if (centroVenom > centroAranha + 150) venom.x -= 3;
                    else if (centroVenom < centroAranha - 150) venom.x += 3;

                    if (Math.random() < 0.025) {
                        ataquesVenom.push({
                            x: venom.x + (centroVenom > centroAranha ? 0 : venom.w),
                            y: venom.y + 40,
                            vX: centroVenom > centroAranha ? -9 : 9
                        });
                    }

                    if (assets.aranha.complete) ctx.drawImage(assets.aranha, aranha.x, aranha.y, aranha.w, aranha.h);
                    if (assets.venom.complete) ctx.drawImage(assets.venom, venom.x, venom.y, venom.w, venom.h);

                    teias.forEach((t, i) => {
                        t.x += t.vX;
                        ctx.fillStyle = "#fff";
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "cyan";
                        ctx.fillRect(t.x, t.y, 25, 6);
                        ctx.shadowBlur = 0;

                        if (t.x > venom.x && t.x < venom.x + venom.w && t.y > venom.y && t.y < venom.y + venom.h) {
                            venom.vida -= 4;
                            document.getElementById('venom-health').style.width = Math.max(0, venom.vida) + "%";
                            teias.splice(i, 1);
                        }
                    });

                    ataquesVenom.forEach((b, i) => {
                        b.x += b.vX;
                        ctx.fillStyle = "#1a1a1a";
                        ctx.beginPath();
                        ctx.arc(b.x, b.y, 14, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = "#60399f";
                        ctx.stroke();

                        if (b.x > aranha.x && b.x < aranha.x + aranha.w && b.y > aranha.y && b.y < aranha.y + aranha.h) {
                            aranha.vida -= 8;
                            document.getElementById('aranha-health').style.width = Math.max(0, aranha.vida) + "%";
                            ataquesVenom.splice(i, 1);
                        }
                    });

                    if (aranha.vida <= 0 || venom.vida <= 0) {
                        jogoAtivo = false;
                        const vContainer = document.getElementById('vitoria-msg-container');
                        const vText = document.getElementById('vitoria-msg-text');

                        if (aranha.vida > 0) {
                            vText.innerText = "SPIDER-MAN WINS!";
                            vText.style.color = "var(--vermelho-aranha)";
                            scoreAranha++;
                        } else {
                            vText.innerText = "VENOM WINS!";
                            vText.style.color = "var(--roxo-venom)";
                            scoreVenom++;
                        }

                        document.getElementById('score-aranha').innerText = scoreAranha;
                        document.getElementById('score-venom').innerText = scoreVenom;
                        vContainer.style.display = 'flex';
                        setTimeout(resetJogo, 3000);
                        return;
                    }

                    requestAnimationFrame(loop);
                }

                function pular() { if (jogoAtivo && !aranha.pulando) { aranha.vY = -18; aranha.pulando = true; } }
                function atirar() { if (jogoAtivo) teias.push({ x: aranha.x + (aranha.dir === 1 ? aranha.w : -20), y: aranha.y + 45, vX: aranha.dir * 15 }); }

                window.addEventListener('keydown', e => {
                    const k = e.key.toLowerCase();
                    if (k === 'a') keys.a = true; if (k === 'd') keys.d = true;
                    if (k === 'w') pular(); if (k === 'f') atirar();
                });

                window.addEventListener('keyup', e => {
                    const k = e.key.toLowerCase();
                    if (k === 'a') keys.a = false; if (k === 'd') keys.d = false;
                });

                const setupBtn = (id, start, end) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); }, { passive: false });
                    if (end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); }, { passive: false });
                };

                setupBtn('btn-esquerda', () => keys.a = true, () => keys.a = false);
                setupBtn('btn-direita', () => keys.d = true, () => keys.d = false);
                setupBtn('btn-pular', pular);
                setupBtn('btn-teia', atirar);
            </script>
</body>

</html>
