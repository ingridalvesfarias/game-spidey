<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="./assets/favicon.jpeg" type="image/x-icon">
    <title>SPIDER-MAN VS GREEN GOBLIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');

        :root {
            --vermelho-aranha: #ff0000;
            --verde-duende: #39FF14;
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Bangers', cursive, system-ui;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #start-overlay h2 {
            font-size: 50px;
            color: var(--verde-duende);
            text-shadow: 0 0 20px var(--verde-duende);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .nav-button-game {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #000;
            border: 2px solid var(--vermelho-aranha);
            color: var(--vermelho-aranha);
            padding: 8px 20px;
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            transform: skew(-15deg);
        }

        .nav-button-game:hover {
            background: var(--vermelho-aranha);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        .main-title {
            text-align: center;
            font-size: clamp(24px, 6vw, 45px);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 3px 3px 0 var(--vermelho-aranha), -3px -3px 0 var(--verde-duende);
        }

        #placar {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
        }

        .game-container {
            position: relative;
            border: 3px solid #333;
            background-color: #000;
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #gui {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .player-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-icon {
            width: clamp(35px, 8vw, 55px);
            height: clamp(35px, 8vw, 55px);
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .aranha-border {
            border-color: var(--vermelho-aranha);
            box-shadow: 0 0 15px var(--vermelho-aranha);
        }

        .duende-border {
            border-color: var(--verde-duende);
            box-shadow: 0 0 15px var(--verde-duende);
        }

        .health-container {
            width: clamp(80px, 20vw, 180px);
            height: 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            transform: skew(-15deg);
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        #aranha-health {
            background-color: var(--vermelho-aranha);
        }

        #duende-health {
            background-color: var(--verde-duende);
            float: right;
        }

        .vs-badge {
            font-size: 24px;
            margin: 0 15px;
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        #vitoria-msg-container {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #vitoria-msg-text {
            font-size: clamp(40px, 10vw, 80px);
            margin: 0;
            text-align: center;
        }

        .spider-wins {
            color: var(--vermelho-aranha);
            text-shadow: 0 0 30px var(--vermelho-aranha);
        }

        .goblin-wins {
            color: var(--verde-duende);
            text-shadow: 0 0 30px var(--verde-duende);
        }

        .controles-touch {
            display: none;
            position: relative;
            width: 100%;
            height: 200px;
            z-index: 1001;
        }

        .controles-touch button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: #222;
            color: white;
            font-family: 'Bangers';
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            position: absolute;
        }

        #btn-pular {
            background: var(--vermelho-aranha) !important;
            left: 25%;
            transform: translateX(-50%);
            bottom: 110px;
        }

        #btn-esquerda {
            left: 5%;
            bottom: 30px;
        }

        #btn-direita {
            left: calc(5% + 80px);
            bottom: 30px;
        }

        #btn-teia {
            background: var(--vermelho-aranha) !important;
            right: 5%;
            bottom: 70px;
        }

        @media (max-width: 768px) {
            .controles-touch {
                display: block;
            }

            #controls-info {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="start-overlay" onclick="startGame()">
        <h2>READY TO FIGHT?</h2>
    </div>

    <a href="index.html" class="nav-button-game">
        < BACK</a>

            <h1 class="main-title">SPIDER-MAN VS GREEN GOBLIN</h1>

            <div id="placar">
                SPIDER: <span id="score-aranha">0</span> | GOBLIN: <span id="score-duende">0</span>
            </div>

            <div class="game-container">
                <div id="vitoria-msg-container">
                    <h2 id="vitoria-msg-text"></h2>
                    <p style="font-size: 20px; margin-top: 10px;">REINICIANDO EM 3s...</p>
                </div>

                <div id="gui">
                    <div class="player-wrapper">
                        <img src="assets/icon-aranha.jpeg" class="player-icon aranha-border">
                        <div class="health-container">
                            <div id="aranha-health" class="health-bar"></div>
                        </div>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="player-wrapper">
                        <div class="health-container">
                            <div id="duende-health" class="health-bar"></div>
                        </div>
                        <img src="assets/icon-duende.jpeg" class="player-icon duende-border">
                    </div>
                </div>

                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controles-touch">
                <button id="btn-pular" class="btn-action">PULO</button>
                <button id="btn-esquerda">◀</button>
                <button id="btn-direita">▶</button>
                <button id="btn-teia" class="btn-action">TEIA</button>
            </div>

            <div id="controls-info">
                [A-D] ANDAR <span>|</span> [W] PULAR <span>|</span> [F] ATIRAR TEIA
            </div>

            <script>
                const canvas = document.getElementById("gameCanvas");
                const ctx = canvas.getContext("2d");

                let gameScale = 1;

                function resizeCanvas() {
                    const container = document.querySelector('.game-container');
                    canvas.width = container.clientWidth;
                    canvas.height = container.clientHeight;

                    // Ajusta o tamanho dos personagens e da tela de vitória
                    if (window.innerWidth <= 768) {
                        gameScale = 0.65;
                    } else {
                        gameScale = 1;
                    }

                    aranha.w = 75 * gameScale;
                    aranha.h = 100 * gameScale;
                    duende.w = 85 * gameScale;
                    duende.h = 110 * gameScale;
                }

                window.addEventListener('resize', resizeCanvas);

                const fundoImg = new Image(); fundoImg.src = 'assets/img-fundo1.png';
                const aranhaImg = new Image(); aranhaImg.src = 'assets/spidey-game1.png';
                const duendeImg = new Image(); duendeImg.src = 'assets/green-goblin.png';

                const musicaFundo = new Audio('assets/goblin-fight.mp3');
                musicaFundo.loop = true;
                musicaFundo.volume = 0.5;

                let jogoAtivo = false;
                let scoreAranha = 0, scoreDuende = 0;
                const keys = { a: false, d: false };

                const aranha = { x: 100, y: 200, w: 75, h: 100, vida: 100, vY: 0, pulando: false, dir: 1 };
                const duende = { x: 500, y: 200, w: 85, h: 110, vida: 100, vY: 0 };

                resizeCanvas();

                let teias = [], bombas = [];

                function startGame() {
                    document.getElementById('start-overlay').style.display = 'none';
                    musicaFundo.play().catch(e => console.log("Erro áudio:", e));
                    if (!jogoAtivo) { jogoAtivo = true; loop(); }
                }

                function resetJogo() {
                    aranha.vida = 100; duende.vida = 100;
                    aranha.x = 100; duende.x = canvas.width - (150 * gameScale);
                    teias = []; bombas = [];
                    document.getElementById('aranha-health').style.width = "100%";
                    document.getElementById('duende-health').style.width = "100%";
                    document.getElementById('vitoria-msg-container').style.display = 'none';
                    if (!jogoAtivo) { jogoAtivo = true; loop(); }
                }

                function loop() {
                    if (!jogoAtivo) return;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (fundoImg.complete) ctx.drawImage(fundoImg, 0, 0, canvas.width, canvas.height);

                    [aranha, duende].forEach(p => {
                        p.y += p.vY;
                        const groundY = canvas.height - 30;
                        if (p.y + p.h < groundY) { p.vY += 0.8; }
                        else { p.vY = 0; p.y = groundY - p.h; p.pulando = false; }
                    });

                    const moveSpeed = 7 * gameScale;
                    if (keys.a) { aranha.x -= moveSpeed; aranha.dir = -1; }
                    if (keys.d) { aranha.x += moveSpeed; aranha.dir = 1; }
                    aranha.x = Math.max(0, Math.min(canvas.width - aranha.w, aranha.x));

                    const dist = duende.x - aranha.x;
                    if (dist > canvas.width / 2) duende.x -= moveSpeed * 0.4;
                    else if (dist < 150 * gameScale) duende.x += moveSpeed * 0.4;
                    duende.x = Math.max(0, Math.min(canvas.width - duende.w, duende.x));

                    if (Math.random() < 0.02) { bombas.push({ x: duende.x, y: duende.y + 30, vX: -7 * gameScale, vY: -3 * gameScale }); }

                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "red";
                    if (aranhaImg.complete) ctx.drawImage(aranhaImg, aranha.x, aranha.y, aranha.w, aranha.h);
                    ctx.shadowColor = "#39FF14";
                    if (duendeImg.complete) ctx.drawImage(duendeImg, duende.x, duende.y, duende.w, duende.h);
                    ctx.shadowBlur = 0;

                    teias.forEach((t, i) => {
                        t.x += t.vX;
                        ctx.fillStyle = "white";
                        ctx.fillRect(t.x, t.y, 20 * gameScale, 5 * gameScale);
                        if (t.x > duende.x && t.x < duende.x + duende.w && t.y > duende.y && t.y < duende.y + duende.h) {
                            duende.vida -= 5;
                            document.getElementById('duende-health').style.width = Math.max(0, duende.vida) + "%";
                            teias.splice(i, 1);
                        }
                        if (t.x > canvas.width || t.x < 0) teias.splice(i, 1);
                    });

                    bombas.forEach((b, i) => {
                        b.x += b.vX; b.y += b.vY; b.vY += 0.15;
                        ctx.fillStyle = "orange";
                        ctx.beginPath(); ctx.arc(b.x, b.y, 8 * gameScale, 0, Math.PI * 2); ctx.fill();
                        if (b.x > aranha.x && b.x < aranha.x + aranha.w && b.y > aranha.y && b.y < aranha.y + aranha.h) {
                            aranha.vida -= 10;
                            document.getElementById('aranha-health').style.width = Math.max(0, aranha.vida) + "%";
                            bombas.splice(i, 1);
                        }
                        if (b.y > canvas.height) bombas.splice(i, 1);
                    });

                    if (aranha.vida <= 0 || duende.vida <= 0) {
                        jogoAtivo = false;
                        const vitoriaContainer = document.getElementById('vitoria-msg-container');
                        const vitoriaText = document.getElementById('vitoria-msg-text');
                        if (aranha.vida > 0) {
                            vitoriaText.innerText = "SPIDER-MAN WINS!";
                            vitoriaText.className = "spider-wins";
                            scoreAranha++;
                        } else {
                            vitoriaText.innerText = "GOBLIN WINS!";
                            vitoriaText.className = "goblin-wins";
                            scoreDuende++;
                        }
                        document.getElementById('score-aranha').innerText = scoreAranha;
                        document.getElementById('score-duende').innerText = scoreDuende;
                        vitoriaContainer.style.display = 'flex';
                        setTimeout(resetJogo, 3000);
                        return;
                    }
                    requestAnimationFrame(loop);
                }

                function pular() { if (jogoAtivo && !aranha.pulando) { aranha.vY = -16 * gameScale; aranha.pulando = true; } }
                function atirar() { if (jogoAtivo) teias.push({ x: aranha.x + (aranha.dir === 1 ? aranha.w : -10), y: aranha.y + 30, vX: aranha.dir * (14 * gameScale) }); }

                window.addEventListener('keydown', e => {
                    if (!jogoAtivo) return;
                    const k = e.key.toLowerCase();
                    if (k === 'a') keys.a = true; if (k === 'd') keys.d = true;
                    if (k === 'w') pular(); if (k === 'f') atirar();
                });

                window.addEventListener('keyup', e => {
                    const k = e.key.toLowerCase();
                    if (k === 'a') keys.a = false; if (k === 'd') keys.d = false;
                });

                const bindBtn = (id, start, end) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
                    if (end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
                    el.addEventListener('mousedown', (e) => { start(); });
                    if (end) el.addEventListener('mouseup', (e) => { end(); });
                };
                bindBtn('btn-esquerda', () => keys.a = true, () => keys.a = false);
                bindBtn('btn-direita', () => keys.d = true, () => keys.d = false);
                bindBtn('btn-pular', pular);
                bindBtn('btn-teia', atirar);
            </script>
</body>

</html>
