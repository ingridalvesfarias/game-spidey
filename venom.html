<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" href="./assets/favicon.jpeg" type="image/x-icon">
    <title>SPIDER-MAN VS VENOM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');

        :root {
            --vermelho-aranha: #ff0000;
            --roxo-venom: #60399f;
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Bangers', cursive, system-ui;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }

        /* OVERLAY PARA INICIAR ÁUDIO */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #start-overlay h2 {
            font-size: 50px;
            color: var(--vermelho-aranha);
            text-shadow: 0 0 20px var(--vermelho-aranha);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .nav-button-game {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #000;
            border: 2px solid var(--vermelho-aranha);
            color: var(--vermelho-aranha);
            padding: 8px 20px;
            cursor: pointer;
            z-index: 1000;
            font-size: 16px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            transform: skew(-15deg);
        }

        .nav-button-game:hover {
            background: var(--vermelho-aranha);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        .main-title {
            text-align: center;
            font-size: clamp(24px, 6vw, 45px);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 3px 3px 0 var(--vermelho-aranha), -3px -3px 0 var(--roxo-venom);
        }

        #placar {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 20px;
            border-radius: 20px;
        }

        .game-container {
            position: relative;
            border: 3px solid #333;
            background-color: #000;
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #gui {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .player-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-icon {
            width: clamp(35px, 8vw, 55px);
            height: clamp(35px, 8vw, 55px);
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .aranha-border {
            border-color: var(--vermelho-aranha);
            box-shadow: 0 0 15px var(--vermelho-aranha);
        }

        .venom-border {
            border-color: var(--roxo-venom);
            box-shadow: 0 0 15px var(--roxo-venom);
        }

        .health-container {
            width: clamp(80px, 20vw, 180px);
            height: 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            transform: skew(-15deg);
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        #aranha-health {
            background-color: var(--vermelho-aranha);
        }

        #venom-health {
            background-color: var(--roxo-venom);
            float: right;
        }

        .vs-badge {
            font-size: 24px;
            margin: 0 15px;
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        #vitoria-msg-container {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #vitoria-msg-text {
            font-size: clamp(40px, 10vw, 80px);
            margin: 0;
            text-align: center;
        }

        .spider-wins {
            color: var(--vermelho-aranha);
            text-shadow: 0 0 30px var(--vermelho-aranha);
        }

        .venom-wins {
            color: var(--roxo-venom);
            text-shadow: 0 0 30px var(--roxo-venom);
        }

        .controles-touch {
            display: none;
            justify-content: space-between;
            width: 95%;
            max-width: 650px;
            padding: 20px 0;
        }

        .controles-touch button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: #222;
            color: white;
            font-family: 'Bangers';
            font-size: 16px;
            cursor: pointer;
        }

        .btn-action {
            background: var(--roxo-venom) !important;
        }

        /* MENU DE CONTROLES */
        #controls-info {
            margin-top: 15px;
            font-size: 20px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            gap: 15px;
            opacity: 0.8;
        }

        #controls-info span {
            color: #444;
        }

        @media (max-width: 768px) {
            .controles-touch {
                display: flex;
            }

            #controls-info {
                display: none;
            }

            .main-title {
                font-size: 20px;
                padding: 0 60px;
            }
        }
    </style>
</head>

<body>
    <div id="start-overlay" onclick="startGame()">
        <h2>CLICK TO FIGHT!</h2>
    </div>

    <a href="index.html" class="nav-button-game">
        < BACK</a>

            <h1 class="main-title">SPIDER-MAN VS VENOM</h1>

            <div id="placar">
                SPIDER: <span id="score-aranha">0</span> | VENOM: <span id="score-venom">0</span>
            </div>

            <div class="game-container">
                <div id="vitoria-msg-container">
                    <h2 id="vitoria-msg-text"></h2>
                    <p style="font-size: 20px; margin-top: 10px;">REINICIANDO COMBATE...</p>
                </div>

                <div id="gui">
                    <div class="player-wrapper">
                        <img src="assets/icon-aranha.jpeg" class="player-icon aranha-border">
                        <div class="health-container">
                            <div id="aranha-health" class="health-bar"></div>
                        </div>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="player-wrapper">
                        <div class="health-container">
                            <div id="venom-health" class="health-bar"></div>
                        </div>
                        <img src="assets/icon-venom.jpeg" class="player-icon venom-border">
                    </div>
                </div>

                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controles-touch">
                <div style="display: flex; gap: 10px;">
                    <button id="btn-esquerda">◀</button>
                    <button id="btn-direita">▶</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-pular" class="btn-action">PULO</button>
                    <button id="btn-teia" class="btn-action">TEIA</button>
                </div>
            </div>

            <div id="controls-info">
                [A-D] ANDAR <span>|</span> [W] PULAR <span>|</span> [F] ATIRAR TEIA
            </div>

            <script>
                const canvas = document.getElementById("gameCanvas");
                const ctx = canvas.getContext("2d");
                canvas.width = 800;
                canvas.height = 450;

                const fundoImg = new Image(); fundoImg.src = 'assets/img-fundo2.png';
                const aranhaImg = new Image(); aranhaImg.src = 'assets/spidey-game2.png';
                const venomImg = new Image(); venomImg.src = 'assets/venom-game.png';

                const musicaFundo = new Audio('assets/venom-theme.mp3');
                musicaFundo.loop = true;
                musicaFundo.volume = 0.5;

                let jogoAtivo = false;
                let scoreAranha = 0, scoreVenom = 0;
                const keys = { a: false, d: false };

                const aranha = { x: 100, y: 200, w: 75, h: 100, vida: 100, vY: 0, pulando: false, dir: 1 };
                const venom = { x: 600, y: 200, w: 90, h: 115, vida: 100, vY: 0 };

                let teias = [], ataquesVenom = [];

                function startGame() {
                    document.getElementById('start-overlay').style.display = 'none';
                    musicaFundo.play().catch(e => console.log("Erro audio:", e));
                    jogoAtivo = true;
                    loop();
                }

                function resetJogo() {
                    aranha.vida = 100; venom.vida = 100;
                    aranha.x = 100; venom.x = 600;
                    teias = []; ataquesVenom = [];
                    document.getElementById('aranha-health').style.width = "100%";
                    document.getElementById('venom-health').style.width = "100%";
                    document.getElementById('vitoria-msg-container').style.display = 'none';
                    jogoAtivo = true;
                }

                function loop() {
                    if (!jogoAtivo) return;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (fundoImg.complete) ctx.drawImage(fundoImg, 0, 0, canvas.width, canvas.height);

                    [aranha, venom].forEach(p => {
                        p.y += p.vY;
                        if (p.y + p.h < canvas.height - 30) { p.vY += 0.8; }
                        else { p.vY = 0; p.y = canvas.height - 30 - p.h; p.pulando = false; }
                    });

                    if (keys.a) { aranha.x -= 7; aranha.dir = -1; }
                    if (keys.d) { aranha.x += 7; aranha.dir = 1; }
                    aranha.x = Math.max(0, Math.min(canvas.width - aranha.w, aranha.x));

                    const dist = venom.x - aranha.x;
                    if (dist > 150) venom.x -= 3.5;
                    else if (dist < 100) venom.x += 3.5;
                    venom.x = Math.max(0, Math.min(canvas.width - venom.w, venom.x));

                    if (Math.random() < 0.02) {
                        ataquesVenom.push({ x: venom.x, y: venom.y + 30, vX: venom.x > aranha.x ? -7 : 7, vY: 0 });
                    }

                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "red";
                    if (aranhaImg.complete) ctx.drawImage(aranhaImg, aranha.x, aranha.y, aranha.w, aranha.h);
                    ctx.shadowColor = "#60399f";
                    if (venomImg.complete) ctx.drawImage(venomImg, venom.x, venom.y, venom.w, venom.h);
                    ctx.shadowBlur = 0;

                    teias.forEach((t, i) => {
                        t.x += t.vX;
                        ctx.fillStyle = "cyan";
                        ctx.fillRect(t.x, t.y, 20, 5);
                        if (t.x > venom.x && t.x < venom.x + venom.w && t.y > venom.y && t.y < venom.y + venom.h) {
                            venom.vida -= 5;
                            document.getElementById('venom-health').style.width = Math.max(0, venom.vida) + "%";
                            teias.splice(i, 1);
                        }
                    });

                    ataquesVenom.forEach((b, i) => {
                        b.x += b.vX;
                        ctx.fillStyle = "black";
                        ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = "#60399f"; ctx.lineWidth = 2; ctx.stroke();

                        if (b.x > aranha.x && b.x < aranha.x + aranha.w && b.y > aranha.y && b.y < aranha.y + aranha.h) {
                            aranha.vida -= 10;
                            document.getElementById('aranha-health').style.width = Math.max(0, aranha.vida) + "%";
                            ataquesVenom.splice(i, 1);
                        }
                        if (b.x < 0 || b.x > canvas.width) ataquesVenom.splice(i, 1);
                    });

                    if (aranha.vida <= 0 || venom.vida <= 0) {
                        jogoAtivo = false;
                        const vitoriaContainer = document.getElementById('vitoria-msg-container');
                        const vitoriaText = document.getElementById('vitoria-msg-text');

                        if (aranha.vida > 0) {
                            vitoriaText.innerText = "SPIDER-MAN WINS!";
                            vitoriaText.className = "spider-wins";
                            scoreAranha++;
                        } else {
                            vitoriaText.innerText = "VENOM WINS!";
                            vitoriaText.className = "venom-wins";
                            scoreVenom++;
                        }

                        document.getElementById('score-aranha').innerText = scoreAranha;
                        document.getElementById('score-venom').innerText = scoreVenom;
                        vitoriaContainer.style.display = 'flex';

                        setTimeout(resetJogo, 3000);
                        return;
                    }
                    requestAnimationFrame(loop);
                }

                function pular() { if (jogoAtivo && !aranha.pulando) { aranha.vY = -16; aranha.pulando = true; } }
                function atirar() { if (jogoAtivo) teias.push({ x: aranha.x + (aranha.dir === 1 ? 50 : -10), y: aranha.y + 30, vX: aranha.dir * 14 }); }

                window.addEventListener('keydown', e => {
                    if (!jogoAtivo) return;
                    const k = e.key.toLowerCase();
                    if (k === 'a') keys.a = true; if (k === 'd') keys.d = true;
                    if (k === 'w') pular(); if (k === 'f') atirar();
                });

                window.addEventListener('keyup', e => {
                    const k = e.key.toLowerCase();
                    if (k === 'a') keys.a = false; if (k === 'd') keys.d = false;
                });

                const bindBtn = (id, start, end) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); if (jogoAtivo) start(); });
                    if (end) el.addEventListener('touchend', (e) => { e.preventDefault(); end(); });
                };
                bindBtn('btn-esquerda', () => keys.a = true, () => keys.a = false);
                bindBtn('btn-direita', () => keys.d = true, () => keys.d = false);
                bindBtn('btn-pular', pular);
                bindBtn('btn-teia', atirar);
            </script>
</body>

</html>
