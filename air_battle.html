<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider-Man vs Green Goblin - Air Battle</title>
    <link rel="icon" type="image/jpeg" href="assets/favicon.jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');

        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Bangers', cursive, system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #start-overlay h2 {
            font-size: clamp(40px, 10vw, 70px);
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: pulse 1.5s infinite;
            margin: 0;
        }

        #start-overlay p { font-size: 20px; color: #888; margin-top: 10px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .nav-button-game {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #000;
            border: 2px solid #ff0000;
            color: #ff0000;
            padding: 8px 20px;
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            transform: skew(-15deg);
        }

        .nav-button-game:hover {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        #game-wrapper {
            position: relative;
            border: 3px solid #333;
            background: #000;
            width: 95vw;
            max-width: 850px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; }

        #hud {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hud-side { display: flex; align-items: center; }

        .icon {
            width: clamp(35px, 10vw, 55px);
            height: clamp(35px, 10vw, 55px);
            border-radius: 50%;
            background-size: cover;
            border: 2px solid #fff;
        }

        .player-icon { background-image: url('assets/icon-aranha.jpeg'); box-shadow: 0 0 15px #ff0000; margin-right: 10px; }
        .boss-icon { background-image: url('assets/icon-duende.jpeg'); box-shadow: 0 0 15px #00ff00; margin-left: 10px; }

        .bar-container {
            width: clamp(80px, 20vw, 200px);
            height: 16px;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.7);
            transform: skew(-15deg);
            overflow: hidden;
        }

        .hp-bar { height: 100%; transition: width 0.3s ease; }
        #player-hp { background: #ff0000; width: 100%; }
        #boss-hp { background: #00ff00; width: 100%; float: right; }

        #vs-tag { font-size: clamp(18px, 4vw, 28px); margin: 0 15px; text-shadow: 2px 2px #000; }

        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 600px;
            justify-content: space-around;
            padding: 15px;
            z-index: 200;
        }

        .btn-attack {
            width: 75px; height: 75px; border-radius: 50%;
            background: #ff0000; color: white; border: 3px solid #fff;
            font-family: 'Bangers'; font-size: 18px; cursor: pointer;
        }

        .btn-swing { background: #3498db; }

        #end-screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .victory-title { font-size: clamp(40px, 12vw, 80px); text-align: center; margin: 0; }
        .spider-wins { color: #ff0000; text-shadow: 0 0 25px #ff0000; }
        .duende-wins { color: #00ff00; text-shadow: 0 0 25px #00ff00; }

        .btn-restart {
            margin-top: 20px; padding: 12px 35px; font-size: 22px;
            background: #e62429; color: white; border: 2px solid #fff;
            cursor: pointer; font-family: 'Bangers'; transform: skew(-15deg);
        }

        #controls-info { margin-top: 10px; font-size: 14px; color: #666; }

        @media (max-width: 768px) {
            #mobile-controls { display: flex; }
            #controls-info { display: none; }
        }
    </style>
</head>

<body>

    <div id="start-overlay" onclick="startGame()">
        <h2>CLICK TO SWING</h2>
        <p>AIR BATTLE READY!</p>
    </div>

    <a href="index.html" class="nav-button-game">< BACK</a>

    <div id="game-wrapper">
        <div id="hud">
            <div class="hud-side">
                <div class="icon player-icon"></div>
                <div class="bar-container"><div id="player-hp" class="hp-bar"></div></div>
            </div>
            <div id="vs-tag">VS</div>
            <div class="hud-side">
                <div class="bar-container"><div id="boss-hp" class="hp-bar"></div></div>
                <div class="icon boss-icon"></div>
            </div>
        </div>

        <div id="end-screen">
            <h1 id="winner-message" class="victory-title"></h1>
            <button class="btn-restart" id="btn-play-again">PLAY AGAIN</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="mobile-controls">
        <button class="btn-attack btn-swing" id="m-swing">SWING</button>
        <button class="btn-attack" id="m-shoot">WEB</button>
    </div>

    <div id="controls-info">[ESPAÇO] Balanço | [F] Atirar | [R] Reiniciar</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 800; 
        canvas.height = 300;

        const bgMusic = new Audio('assets/high-speed.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.4;

        const bgImg = new Image(); bgImg.src = 'assets/img-fundo3.png';
        const spiderImg = new Image(); spiderImg.src = 'assets/spidey-game3.png';
        const goblinImg = new Image(); goblinImg.src = 'assets/green-goblin.png';

        let gameActive = false; // Inicia desativado
        const gravity = 0.6;
        const friction = 0.985;

        const player = {
            x: 100, y: 150, vx: 0, vy: 0, w: 80, h: 80,
            health: 100, isSwinging: false, anchorX: 0, anchorY: 0,
            ropeLen: 0, angle: 0, angleV: 0, projectiles: []
        };

        const boss = {
            x: 800, y: 150, w: 110, h: 100,
            health: 100, timer: 0, bombs: []
        };

        // FUNÇÃO DE INÍCIO
        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            bgMusic.play().catch(e => console.log("Aguardando interação..."));
            gameActive = true;
            loop();
        }

        function startSwing() {
            if (player.isSwinging || !gameActive) return;
            
            player.anchorX = player.x + 200;
            player.anchorY = -250; 
            
            let dx = player.x - player.anchorX;
            let dy = player.y - player.anchorY;
            
            player.ropeLen = Math.min(Math.hypot(dx, dy), 400);
            player.angle = Math.atan2(dx, dy);
            player.angleV = player.vx / player.ropeLen;
            player.isSwinging = true;
        }

        function shootWeb() {
            if (!gameActive) return;
            player.projectiles.push({ x: player.x + 50, y: player.y + 30, vx: 22, vy: -8 });
        }

        function showResult(msg, isSpider) {
            gameActive = false;
            const screen = document.getElementById('end-screen');
            const text = document.getElementById('winner-message');
            text.innerText = msg;
            text.className = isSpider ? 'victory-title spider-wins' : 'victory-title duende-wins';
            screen.style.display = 'flex';
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Space') startSwing();
            if (e.code === 'KeyF') shootWeb();
            if (e.code === 'KeyR' && !gameActive) location.reload();
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'Space') player.isSwinging = false;
        });

        document.getElementById('m-swing').addEventListener('touchstart', e => { e.preventDefault(); startSwing(); });
        document.getElementById('m-swing').addEventListener('touchend', e => { e.preventDefault(); player.isSwinging = false; });
        document.getElementById('m-shoot').addEventListener('touchstart', e => { e.preventDefault(); shootWeb(); });
        document.getElementById('btn-play-again').addEventListener('click', () => location.reload());

        function update() {
            if (!gameActive) return;

            if (player.isSwinging) {
                let gEff = gravity * Math.sin(player.angle);
                player.angleV -= gEff / 40;
                player.angle += player.angleV;
                player.angleV *= 0.992;
                player.x = player.anchorX + Math.sin(player.angle) * player.ropeLen;
                player.y = player.anchorY + Math.cos(player.angle) * player.ropeLen;
                player.vx = player.angleV * player.ropeLen;
                player.vy = 0;
            } else {
                player.vy += gravity;
                player.vx *= friction;
                player.x += player.vx; player.y += player.vy;
                
                if (player.y > canvas.height - 110) { 
                    player.y = canvas.height - 110; 
                    player.vy = 0; 
                }
                if (player.y < 0) { player.y = 0; player.vy = 0; }
                if (player.x < 0) player.x = 0;
            }

            boss.timer += 0.04;
            boss.y = 100 + Math.sin(boss.timer) * 100;
            boss.x = 700 + Math.cos(boss.timer * 0.5) * 180;

            if (Math.random() < 0.03) {
                boss.bombs.push({ x: boss.x + 30, y: boss.y + 40, vx: -10, vy: 2, r: 8 });
            }

            player.projectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x > boss.x && p.x < boss.x + boss.w && p.y > boss.y && p.y < boss.y + boss.h) {
                    boss.health -= 5;
                    player.projectiles.splice(i, 1);
                    document.getElementById('boss-hp').style.width = Math.max(0, boss.health) + "%";
                }
                if (p.x > canvas.width) player.projectiles.splice(i, 1);
            });

            boss.bombs.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy; b.vy += 0.15;
                if (Math.hypot(b.x - (player.x + player.w/2), b.y - (player.y + player.h/2)) < 35) {
                    player.health -= 10;
                    boss.bombs.splice(i, 1);
                    document.getElementById('player-hp').style.width = Math.max(0, player.health) + "%";
                }
                if (b.y > canvas.height) boss.bombs.splice(i, 1);
            });

            if (boss.health <= 0) showResult("SPIDER-MAN WINS!", true);
            if (player.health <= 0) showResult("DUENDE WINS!", false);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

            if (player.isSwinging) {
                ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(player.anchorX, player.anchorY);
                ctx.lineTo(player.x + 40, player.y + 30); ctx.stroke();
            }

            player.projectiles.forEach(p => {
                ctx.fillStyle = "white";
                ctx.shadowBlur = 10; ctx.shadowColor = "white";
                ctx.fillRect(p.x, p.y, 30, 6);
                ctx.shadowBlur = 0;
            });

            ctx.drawImage(spiderImg, player.x, player.y, player.w, player.h);
            ctx.drawImage(goblinImg, boss.x, boss.y, boss.w, boss.h);

            boss.bombs.forEach(b => {
                ctx.fillStyle = "#ffaa00";
                ctx.shadowBlur = 15; ctx.shadowColor = "orange";
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function loop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Desenha o fundo inicial mas espera o clique para rodar o loop
        bgImg.onload = () => {
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        };
    </script>
</body>
</html>
